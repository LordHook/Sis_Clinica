<!DOCTYPE html>
<html lang="es" th:fragment="base(contenido)" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica UTP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="flex h-screen w-screen overflow-hidden p-0 md:p-4 bg-slate-100">

    <div class="flex h-full w-full wire-box shadow-xl border-0 overflow-hidden">
        
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <div class="flex-1 flex flex-col bg-slate-50 relative">
            
            <div th:replace="~{fragments/header :: header}"></div>

            <main class="flex-1 relative overflow-auto p-8" th:insert="${contenido}">
            </main>
        </div>
    </div>

    <script th:src="@{/js/app.js}"></script>
</body>
</html>
