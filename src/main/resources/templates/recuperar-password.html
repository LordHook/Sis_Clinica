<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Clínica UTP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="flex h-screen w-screen overflow-hidden p-0 md:p-4 bg-slate-100 items-center justify-center">

    <div class="flex h-full w-full items-center justify-center relative">
        <div class="wire-box p-10 max-w-md w-full shadow-2xl border-0 bg-white">
            <div class="text-center mb-8 border-b border-slate-200 pb-6">
                <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl mx-auto mb-4 flex items-center justify-center font-bold text-2xl shadow-sm">🔐</div>
                <h1 class="text-2xl font-black tracking-wide text-slate-800">Recuperar Acceso</h1>
                <p class="text-sm font-medium text-slate-500 mt-1">Validación de Identidad</p>
            </div>
            
            <!-- Alert Messages -->
            <div th:if="${error}" class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 text-red-700 text-sm font-medium rounded shadow-sm">
                <span th:text="${error}">Error</span>
            </div>
            
            <form th:action="@{/recuperar-password}" method="post" class="space-y-5" onsubmit="return validarContrasenas();">
                <div>
                    <label class="block font-semibold mb-1 text-sm text-slate-700">Correo Electrónico Institucional</label>
                    <input type="email" name="correo" placeholder="ej. usuario@clinica.pe" required class="wire-input bg-slate-50" />
                </div>
                <div>
                    <label class="block font-semibold mb-1 text-sm text-slate-700">Documento de Identidad (DNI)</label>
                    <input type="text" name="dni" placeholder="Ej. 74839201" required class="wire-input bg-slate-50" />
                </div>
                
                <div class="pt-4 border-t border-slate-100">
                    <label class="block font-semibold mb-1 text-sm text-slate-700">Nueva Contraseña</label>
                    <input type="password" name="nuevaContrasena" id="pass" placeholder="••••••••" required class="wire-input mb-3" />
                    
                    <label class="block font-semibold mb-1 text-sm text-slate-700">Confirmar Nueva Contraseña</label>
                    <input type="password" id="confirmPass" placeholder="••••••••" required class="wire-input" />
                </div>
                
                <div class="flex flex-col gap-3 mt-6 pt-4">
                    <button type="submit" class="wire-btn py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg text-sm shadow-md transition">
                        Actualizar Contraseña
                    </button>
                    <a th:href="@{/login}" class="text-center text-sm font-medium text-slate-500 hover:text-slate-800 transition">
                        Volver al inicio de sesión
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script>
        function validarContrasenas() {
            const pass = document.getElementById('pass').value;
            const confirm = document.getElementById('confirmPass').value;
            
            if (pass !== confirm) {
                alert("Las nuevas contraseñas no coinciden. Por favor, verifíquelas.");
                return false;
            }
            return true;
        }
    </script>
</body>
</html>
