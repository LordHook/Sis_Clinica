<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="sidebar" class="w-64 border-r border-slate-200 flex flex-col shrink-0 p-4 bg-white z-20">
        <div class="flex items-center mb-8 px-2 mt-2">
            <div class="w-10 h-10 bg-blue-600 text-white rounded-lg flex items-center justify-center font-bold text-xl mr-3 shadow-sm">C</div>
            <div>
                <h2 class="font-black text-slate-800 tracking-wide">CLÍNICA UTP</h2>
                <p class="text-xs text-slate-500 font-medium">Portal Médico</p>
            </div>
        </div>
        
<nav class="flex-1 space-y-1 overflow-y-auto pr-2">
    <div class="text-[10px] font-bold text-slate-400 mb-2 mt-4 uppercase tracking-wider px-3">Menú Operativo</div>
    
    <a th:href="@{/dashboard}" class="nav-btn w-full flex items-center px-3 py-2.5 transition-colors" 
       th:classappend="${paginaActiva == 'dashboard'} ? 'nav-active' : 'nav-inactive'">
       📊 Dashboard
    </a>
        <a th:href="@{/citas}" class="nav-btn w-full flex items-center px-3 py-2.5 transition-colors" 
       th:classappend="${paginaActiva == 'citas'} ? 'nav-active' : 'nav-inactive'">
       📅 Módulo Citas
    </a>
    <a th:href="@{/pacientes}" class="nav-btn w-full flex items-center px-3 py-2.5 transition-colors" 
       th:classappend="${paginaActiva == 'pacientes'} ? 'nav-active' : 'nav-inactive'">
       👥 Módulo Pacientes
    </a>
    <div class="space-y-1">
    <a href="/farmacia" 
       th:classappend="${active == 'farmacia'} ? 'bg-blue-50 text-blue-700' : 'text-slate-600'"
       class="flex items-center px-4 py-3 rounded-lg hover:bg-blue-50 transition-colors">
        <span class="mr-3">💊</span>
        <span class="font-medium text-sm">Módulo Farmacia</span>
    </a>
</div>

</nav>

        <a th:href="@{/login}" class="mt-6 py-3 w-full text-slate-500 hover:text-slate-800 hover:bg-slate-50 rounded-lg flex items-center justify-center font-semibold text-sm transition">
            <span class="mr-2">🚪</span> Cerrar Sesión
        </a>
    </div>
</body>
</html>
