<!DOCTYPE html>
<html th:replace="~{layout :: base(~{::section})}" xmlns:th="http://www.thymeleaf.org">
<body>
    <section class="p-8">
        <div class="flex justify-between mb-6">
            <h2 class="text-2xl font-bold">Gestión de Citas</h2>
            <button onclick="toggleModal('modal-nueva-cita', true)" class="bg-blue-600 text-white px-4 py-2 rounded">+ Agendar Cita</button>
        </div>

        <table class="w-full bg-white shadow rounded-lg overflow-hidden">
            <thead class="bg-slate-50">
                <tr class="text-left text-xs uppercase text-slate-500">
                    <th class="p-4">Hora</th><th>Paciente</th><th>Médico</th><th>Estado</th><th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla-citas-body">
                </tbody>
        </table>
    </section>
</body>
</html>
