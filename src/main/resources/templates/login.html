<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Clínica UTP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="flex h-screen w-screen overflow-hidden p-0 md:p-4 bg-slate-100 items-center justify-center">

    <div class="flex h-full w-full items-center justify-center relative">
        <div class="wire-box p-10 max-w-md w-full shadow-2xl border-0 bg-white">
            <div class="text-center mb-8 border-b border-slate-200 pb-6">
                <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl mx-auto mb-4 flex items-center justify-center font-bold text-2xl shadow-sm">🏥</div>
                <h1 class="text-2xl font-black tracking-wide text-slate-800">CLÍNICA UTP</h1>
                <p class="text-sm font-medium text-slate-500 mt-1">Sistema de Gestión Integral</p>
            </div>
            
            <!-- Alert Messages -->
            <div th:if="${mensajeError}" class="mb-4 p-3.5 bg-red-50 border border-red-200 text-red-700 text-xs font-bold rounded-lg text-center">
                <span th:text="${mensajeError}">Error</span>
            </div>
            <div th:if="${mensajeSuccess}" class="mb-4 p-3.5 bg-green-50 border border-green-200 text-green-700 text-xs font-bold rounded-lg text-center">
                <span th:text="${mensajeSuccess}">Éxito</span>
            </div>
            
            <form th:action="@{/login}" method="post" class="space-y-5">
                <div>
                    <label class="block font-semibold mb-1 text-sm text-slate-700">Usuario Institucional</label>
                    <input type="text" name="username" placeholder="Usuario (ej. admin, recep, jperez, farma)" required class="wire-input" />
                </div>
                <div>
                    <label class="block font-semibold mb-1 text-sm text-slate-700">Contraseña</label>
                    <input type="password" name="password" placeholder="••••••••" required class="wire-input" />
                </div>
                
                <button type="submit" class="wire-btn-dark w-full py-3.5 text-sm mt-4 shadow-lg cursor-pointer">
                    Iniciar Sesión
                </button>
            </form>
        </div>
    </div>

</body>
</html>
